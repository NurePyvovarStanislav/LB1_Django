{% load static %}

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Список статей</title>
    <link rel="stylesheet" href="{% static 'articles/style.css' %}">
</head>
<body>
    <div class="container">
        <h1>Список статей</h1>

        {% if articles %}
            {% for article in articles %}
                <div class="article-card">
                    <h2>{{ article.title }}</h2>
                    <p class="date">Дата публікації: {{ article.publication_date }}</p>
                    <p>{{ article.text }}</p>

                    <div class="actions">
                        <a href="{% url 'article_edit' article.id %}" class="btn edit">Редагувати</a>
                        <a href="{% url 'article_delete' article.id %}" class="btn delete">Видалити</a>
                    </div>
                </div>
            {% endfor %}
        {% else %}
            <p>Статей поки немає.</p>
        {% endif %}

        <a href="/admin/articles/article/add/" class="btn add">Додати статтю через адмін-панель</a>
    </div>
</body>
</html>
